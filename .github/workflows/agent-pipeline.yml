name: Aider Task with Universal Failover

on:
  issues:
    types: [opened, edited, labeled]
  issue_comment:
    types: [created]

jobs:
  agent-runner:
    if: github.event.sender.type != 'Bot'
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Config Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Aider
        run: |
          python -m pip install --upgrade pip
          pip install aider-chat

      - name: Run Agent Task with Universal Failover
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # FIX: Bind context to env vars to prevent script injection and handle full context
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          # 1. Determine the prompt and include original context for comments
          if [ "${{ github.event_name }}" == "issue_comment" ]; then
            USER_INPUT="Update for #${{ github.event.issue.number }}: $ISSUE_TITLE. New Instructions: $COMMENT_BODY"
          else
            USER_INPUT="Task #${{ github.event.issue.number }}: $ISSUE_TITLE. Requirements: $ISSUE_BODY"
          fi

          # 2. Multi-Agent selection logic (Generic & respects your file structure)
          AGENT_PATH=".agents/senior-developer.md"
          for label in ${{ join(github.event.issue.labels.*.name, ' ') }}; do
            if [ -f ".agents/$label.md" ]; then
              AGENT_PATH=".agents/$label.md"
              break
            fi
          done

          # 3. Failover Loop
          MODELS=("gemini/gemini-1.5-pro" "gemini/gemini-1.5-flash" "mistral/open-mistral-nemo")
          
          SUCCESS=false
          for MODEL in "${MODELS[@]}"; do
            echo "🤖 Attempting with: $MODEL using $AGENT_PATH"
            
            if timeout 300s aider --model "$MODEL" \
                  --read "$AGENT_PATH" \
                  --file memory-bank/activeContext.md \
                  --file memory-bank/architecture.md \
                  --message "$USER_INPUT" \
                  --yes-always \
                  --no-show-model-warnings; then
              SUCCESS=true
              break
            else
              echo "⚠️ $MODEL failed or timed out. Moving to next provider..."
            fi
          done

          if [ "$SUCCESS" = false ]; then
            echo "❌ Total System Failure."
            exit 1
          fi

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "AI-generated update: #${{ github.event.issue.number }}"
          title: "PR: ${{ github.event.issue.title }}"
          # Branch stays consistent so comments update the same PR
          branch: "ai-fix-${{ github.event.issue.number }}"
          delete-branch: false
          body: |
            ## 🤖 Agentic Update
            This PR addresses Issue #${{ github.event.issue.number }}.
            
            ### 📝 Changes
            - Automatically implemented by Aider.
            - Memory Bank updated.
            
            *Closes #${{ github.event.issue.number }}*