name: Agentic Build Pipeline
on:
  issues:
    types: [labeled]

jobs:
  agent-build:
    if: contains(github.event.issue.labels.*.name, 'agent-build')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Install Aider
        run: pip install aider-chat
      - name: Run Agent Task
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          aider --model gemini/gemini-1.5-flash \
                --read .agents/senior-developer.md \
                --read memory-bank/activeContext.md \
                --message "Issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}. Task: ${{ github.event.issue.body }}" \
                --yes-anyways
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          title: "AI: ${{ github.event.issue.title }}"
          branch: "ai-task-${{ github.event.issue.number }}"
          body: "Auto-generated by your Agentic Base."