name: Aider Task with Universal Failover

on:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created]

jobs:
  run-aider:
    # IMPORTANT: Prevent the bot from replying to itself in an infinite loop
    if: github.event.sender.type != 'Bot'
    runs-on: ubuntu-latest
    
    # FIX 1: Explicitly grant write permissions to the GITHUB_TOKEN
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # FIX 2: Aider needs a git identity to function in CI
      - name: Config Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Aider
        run: |
          python -m pip install --upgrade pip
          pip install aider-chat

      - name: Run Agent Task with Universal Failover
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Determine the prompt based on event type
          if [ "${{ github.event_name }}" == "issue_comment" ]; then
            USER_INPUT="Feedback on Issue #${{ github.event.issue.number }}: ${{ github.event.comment.body }}"
          else
            USER_INPUT="New Task #${{ github.event.issue.number }}: ${{ github.event.issue.title }}. Task: ${{ github.event.issue.body }}"
          fi

          # FIX 3: Use the correct model string for Gemini
          MODELS=("flash" "mistral/open-mistral-nemo")
          
          SUCCESS=false
          for MODEL in "${MODELS[@]}"; do
            echo "🤖 Attempting with: $MODEL"
            
            # Note: Removed --no-auto-commits. Aider needs to commit to track its own progress internally.
            if aider --model "$MODEL" \
                  --read .agents/senior-developer.md \
                  --file memory-bank/activeContext.md \
                  --file memory-bank/architecture.md \
                  --message "$USER_INPUT" \
                  --yes-always \
                  --no-show-model-warnings; then
              SUCCESS=true
              break
            else
              echo "⚠️ $MODEL failed. Trying next provider in 15s..."
              sleep 15
            fi
          done

          if [ "$SUCCESS" = false ]; then
            echo "❌ Total System Failure."
            exit 1
          fi

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "AI-generated update: #${{ github.event.issue.number }}"
          title: "PR: ${{ github.event.issue.title }}"
          body: |
            ## 🤖 Agentic Update
            This PR addresses Issue #${{ github.event.issue.number }}.
            
            ### 📝 Changes
            - Automatically implemented by Aider.
            - Memory Bank updated.
            
            *Closes #${{ github.event.issue.number }}*
          branch: "ai-fix-${{ github.event.issue.number }}"