name: Agentic Build Pipeline
on:
  issues:
    types: [labeled]

jobs:
  agent-build:
    if: contains(github.event.issue.labels.*.name, 'agent-build')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Install Aider
        run: pip install aider-chat
      - name: Run Agent Task
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          aider --model gemini/gemini-1.5-flash \
                --read .agents/senior-developer.md \
                --read memory-bank/activeContext.md \
                --message "Issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}. Task: ${{ github.event.issue.body }}" \
                --yes-always
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          title: "feat: ${{ github.event.issue.title }}" 
          branch: "ai/issue-${{ github.event.issue.number }}"
          commit-message: "feat: ${{ github.event.issue.title }}"
          body: |
            ## 🎯 Summary
            This PR addresses Issue #${{ github.event.issue.number }}.
            
            ## 🛠️ Changes
            - Automatically implemented by Agentic SDLC Pipeline.
            - See commit history for specific file diffs.
            
            ## 🧠 Memory Bank Status
            - [x] `activeContext.md` updated.
            - [x] `architecture.md` verified.
            
            ---
            *Closes #${{ github.event.issue.number }}*